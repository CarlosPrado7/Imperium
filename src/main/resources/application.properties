spring.application.name=Imperium

# Configuración de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/imperium?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate (JPA)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update  # Cambia a "create" si quieres que cree las tablas automáticamente
spring.jpa.show-sql=true  # Muestra las consultas en la consola

# Configuración de logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

